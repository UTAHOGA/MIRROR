<style>
  .elk-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #fdfdfd;
  }

  .elk-icon {
    width: 150px;
    /* This is the magic: The 'gallop' timing matches a real elk's pace */
    animation: gallop 0.8s infinite ease-in-out;
  }

  @keyframes gallop {
    0%   { transform: translateY(0) rotate(0deg) scaleX(1); }
    25%  { transform: translateY(-20px) rotate(-3deg) scaleX(1.05); } /* Lift & Stretch */
    50%  { transform: translateY(0) rotate(0deg) scaleX(1); }          /* Land */
    75%  { transform: translateY(-8px) rotate(2deg) scaleX(0.98); }   /* Short hop */
    100% { transform: translateY(0) rotate(0deg) scaleX(1); }
  }

  .dust-cloud {
    width: 100px;
    height: 10px;
    background: rgba(0,0,0,0.05);
    border-radius: 50%;
    margin-top: -10px;
    animation: shadow-pulse 0.8s infinite ease-in-out;
  }

  @keyframes shadow-pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    25% { transform: scale(1.2); opacity: 0.1; } /* Shadow fades as elk jumps */
  }
</style>

<div class="elk-wrap">
  <img src="https://json.uoga.workers.dev/elk-silhouette.png" class="elk-icon">
  <div class="dust-cloud"></div>
  <p style="font-family: sans-serif; color: #666; margin-top: 20px;">Tracking Utah Wildlife...</p>
</div>
